services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openmemory
      POSTGRES_USER: openmemory
      POSTGRES_PASSWORD: openmemory
    volumes:
      - openmemory-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  openmemory-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      OPENMEMORY_DATABASE_URL: postgresql+psycopg://openmemory:openmemory@postgres:5432/openmemory
      OPENMEMORY_EMBEDDING_PROVIDER: hash
    depends_on:
      - postgres
    stdin_open: true
    tty: true

volumes:
  openmemory-postgres:
